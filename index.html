<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Daily Wins</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    @keyframes slideup {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    .animate-slideup { animation: slideup 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }
    .animate-fadein  { animation: fadein 0.2s ease both; }
    .animate-pop     { animation: pop 0.25s ease; }

    input:focus, select:focus, button:focus-visible {
      outline: 2px solid #6366f150;
      outline-offset: 2px;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Config ────────────────────────────────────────────────────────────────
    const ACCENT      = '#6366f1';
    const STORAGE_KEY = 'daily-wins-habits';
    const LANG_KEY    = 'daily-wins-lang';
    const APIKEY_KEY  = 'daily-wins-apikey';

    const CATEGORIES = ['Fitness', 'Mindfulness', 'Learning', 'Productivity', 'Job Application'];

    const CAT = {
      'Fitness':         { bg: '#dcfce7', text: '#16a34a', dot: '#22c55e' },
      'Mindfulness':     { bg: '#f3e8ff', text: '#9333ea', dot: '#a855f7' },
      'Learning':        { bg: '#dbeafe', text: '#2563eb', dot: '#3b82f6' },
      'Productivity':    { bg: '#fef3c7', text: '#d97706', dot: '#f59e0b' },
      'Job Application': { bg: '#ccfbf1', text: '#0d9488', dot: '#14b8a6' },
    };

    // ─── i18n ──────────────────────────────────────────────────────────────────
    const I18N = {
      en: {
        appName:        'Daily Wins',
        todayProgress:  "Today's Progress",
        of:             'of',
        habitsCompleted:'habits completed',
        addHabit:       'Add Habit',
        newHabit:       'New Habit',
        editHabit:      'Edit Habit',
        habitName:      'Habit Name',
        namePlaceholder:'e.g. Morning run',
        category:       'Category',
        save:           'Save',
        cancel:         'Cancel',
        delete:         'Delete',
        edit:           'Edit',
        currentStreak:  'Current streak',
        longestStreak:  'Longest streak',
        days:           'days',
        day:            'day',
        noHabitsTitle:  'No habits yet',
        noHabitsDesc:   'Add your first habit to start tracking your daily wins!',
        totalHabits:    'Total',
        completedToday: 'Done Today',
        bestStreak:     'Best Streak',
        deleteConfirm:  'Delete this habit? This cannot be undone.',
        markDone:       'Mark complete',
        markUndone:     'Mark incomplete',
        aiLoading:      '✨ Getting your boost…',
        aiError:        'Great job — keep it up! 💪',
        settingsTitle:  'Settings',
        apiKeyLabel:    'Anthropic API Key',
        apiKeyNote:     'Stored in your browser only. Powers motivational messages.',
        cats: {
          'Fitness':         'Fitness',
          'Mindfulness':     'Mindfulness',
          'Learning':        'Learning',
          'Productivity':    'Productivity',
          'Job Application': 'Job Application',
        },
      },
      de: {
        appName:        'Daily Wins',
        todayProgress:  'Heutiger Fortschritt',
        of:             'von',
        habitsCompleted:'Gewohnheiten erledigt',
        addHabit:       'Hinzufügen',
        newHabit:       'Neue Gewohnheit',
        editHabit:      'Gewohnheit bearbeiten',
        habitName:      'Name',
        namePlaceholder:'z.B. Morgen-Lauf',
        category:       'Kategorie',
        save:           'Speichern',
        cancel:         'Abbrechen',
        delete:         'Löschen',
        edit:           'Bearbeiten',
        currentStreak:  'Aktuelle Serie',
        longestStreak:  'Längste Serie',
        days:           'Tage',
        day:            'Tag',
        noHabitsTitle:  'Noch keine Gewohnheiten',
        noHabitsDesc:   'Füge deine erste Gewohnheit hinzu und starte dein Tracking!',
        totalHabits:    'Gesamt',
        completedToday: 'Heute erledigt',
        bestStreak:     'Beste Serie',
        deleteConfirm:  'Gewohnheit wirklich löschen? Dies kann nicht rückgängig gemacht werden.',
        markDone:       'Als erledigt markieren',
        markUndone:     'Markierung aufheben',
        aiLoading:      '✨ Motivation lädt…',
        aiError:        'Super gemacht – weiter so! 💪',
        settingsTitle:  'Einstellungen',
        apiKeyLabel:    'Anthropic API-Schlüssel',
        apiKeyNote:     'Nur in deinem Browser gespeichert. Aktiviert motivierende Nachrichten.',
        cats: {
          'Fitness':         'Fitness',
          'Mindfulness':     'Achtsamkeit',
          'Learning':        'Lernen',
          'Productivity':    'Produktivität',
          'Job Application': 'Bewerbungen',
        },
      },
    };

    // ─── Utils ─────────────────────────────────────────────────────────────────
    const today = () => new Date().toISOString().split('T')[0];

    const dayOffset = (n) => {
      const d = new Date();
      d.setDate(d.getDate() + n);
      return d.toISOString().split('T')[0];
    };

    const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

    function calcStreak(dates = []) {
      const set = new Set(dates);
      if (!set.size) return { current: 0, longest: 0 };

      // Current streak: walk backward from today (or yesterday if today not done)
      let current = 0;
      let cursor = set.has(today()) ? today() : dayOffset(-1);
      while (set.has(cursor)) {
        current++;
        const d = new Date(cursor);
        d.setDate(d.getDate() - 1);
        cursor = d.toISOString().split('T')[0];
      }

      // Longest streak: scan sorted dates
      const sorted = [...set].sort();
      let longest = 1, run = 1;
      for (let i = 1; i < sorted.length; i++) {
        const diff = (new Date(sorted[i]) - new Date(sorted[i - 1])) / 86400000;
        if (diff === 1) { run++; longest = Math.max(longest, run); }
        else run = 1;
      }
      return { current, longest: Math.max(longest, current) };
    }

    const loadHabits = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } };
    const loadLang   = () => localStorage.getItem(LANG_KEY) || 'en';

    // ─── Icons (inline SVG) ────────────────────────────────────────────────────
    const IconCheck  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={3} strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5"><path d="M5 13l4 4L19 7"/></svg>;
    const IconEdit   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><path d="M15.232 5.232l3.536 3.536M3 17.25V21h3.75l10.987-10.987-3.536-3.536L3 17.25z"/></svg>;
    const IconTrash  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>;
    const IconPlus   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" className="w-6 h-6"><path d="M12 5v14M5 12h14"/></svg>;
    const IconTrophy = () => <span style={{fontSize:'1.25rem', lineHeight:1}}>🏆</span>;
    const IconGear   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>;

    // ─── Toast ────────────────────────────────────────────────────────────────
    function Toast({ message, onDismiss }) {
      useEffect(() => {
        const t = setTimeout(onDismiss, 5000);
        return () => clearTimeout(t);
      }, [message]);

      return (
        <div
          className="fixed bottom-24 left-4 right-4 max-w-lg mx-auto z-50 animate-slideup"
          onClick={onDismiss}
        >
          <div
            className="rounded-2xl px-5 py-4 text-white shadow-2xl text-sm leading-relaxed cursor-pointer"
            style={{ background: `linear-gradient(135deg, ${ACCENT}, #818cf8)` }}
          >
            <div className="flex items-start gap-3">
              <span className="text-base flex-shrink-0 mt-0.5">✨</span>
              <span className="flex-1">{message}</span>
              <span className="opacity-50 text-lg flex-shrink-0 leading-none">×</span>
            </div>
          </div>
        </div>
      );
    }

    // ─── SettingsModal ────────────────────────────────────────────────────────
    function SettingsModal({ lang, apiKey, onSave, onCancel }) {
      const T = I18N[lang];
      const [key, setKey] = useState(apiKey);
      const inputRef = useRef(null);
      useEffect(() => { setTimeout(() => inputRef.current?.focus(), 80); }, []);

      return (
        <div
          className="fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 pb-4 sm:pb-0 animate-fadein"
          style={{ background: 'rgba(15,23,42,0.55)', backdropFilter: 'blur(6px)' }}
          onClick={(e) => e.target === e.currentTarget && onCancel()}
        >
          <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden animate-slideup">
            <div className="flex items-center justify-between px-6 pt-6 pb-4">
              <h2 className="text-lg font-bold text-gray-900">{T.settingsTitle}</h2>
              <button onClick={onCancel} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 transition text-lg leading-none">×</button>
            </div>
            <div className="px-6 pb-6 space-y-4">
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-2">{T.apiKeyLabel}</label>
                <input
                  ref={inputRef}
                  type="password"
                  value={key}
                  onChange={e => setKey(e.target.value)}
                  placeholder="sk-ant-..."
                  className="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 text-base font-mono transition"
                  style={{ caretColor: ACCENT }}
                />
                <p className="text-xs text-gray-400 mt-2">{T.apiKeyNote}</p>
              </div>
              <div className="flex gap-3">
                <button
                  type="button"
                  onClick={onCancel}
                  className="flex-1 py-3.5 rounded-xl border border-gray-200 text-gray-600 font-semibold hover:bg-gray-50 transition active:scale-95"
                >
                  {T.cancel}
                </button>
                <button
                  type="button"
                  onClick={() => onSave(key.trim())}
                  className="flex-1 py-3.5 rounded-xl text-white font-bold transition hover:opacity-90 active:scale-95"
                  style={{ background: ACCENT, boxShadow: `0 4px 14px ${ACCENT}50` }}
                >
                  {T.save}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Modal ─────────────────────────────────────────────────────────────────
    function Modal({ lang, habit, onSave, onCancel }) {
      const T = I18N[lang];
      const [name, setName]         = useState(habit?.name     || '');
      const [category, setCategory] = useState(habit?.category || CATEGORIES[0]);
      const inputRef = useRef(null);

      useEffect(() => { setTimeout(() => inputRef.current?.focus(), 80); }, []);

      const submit = (e) => {
        e.preventDefault();
        if (!name.trim()) return;
        onSave({ name: name.trim(), category });
      };

      return (
        <div
          className="fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 pb-4 sm:pb-0 animate-fadein"
          style={{ background: 'rgba(15,23,42,0.55)', backdropFilter: 'blur(6px)' }}
          onClick={(e) => e.target === e.currentTarget && onCancel()}
        >
          <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden animate-slideup">
            {/* Modal header */}
            <div className="flex items-center justify-between px-6 pt-6 pb-4">
              <h2 className="text-lg font-bold text-gray-900">
                {habit ? T.editHabit : T.newHabit}
              </h2>
              <button onClick={onCancel} className="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 transition text-lg leading-none">×</button>
            </div>

            <form onSubmit={submit} className="px-6 pb-6 space-y-5">
              {/* Name */}
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-2">{T.habitName}</label>
                <input
                  ref={inputRef}
                  value={name}
                  onChange={e => setName(e.target.value)}
                  placeholder={T.namePlaceholder}
                  maxLength={60}
                  className="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 text-base transition"
                  style={{ caretColor: ACCENT }}
                />
              </div>

              {/* Category */}
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-2">{T.category}</label>
                <div className="flex flex-wrap gap-2">
                  {CATEGORIES.map(cat => {
                    const c   = CAT[cat];
                    const sel = category === cat;
                    return (
                      <button
                        key={cat}
                        type="button"
                        onClick={() => setCategory(cat)}
                        className="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium transition-all border-2"
                        style={{
                          background:   sel ? c.bg   : '#f9fafb',
                          color:        sel ? c.text : '#9ca3af',
                          borderColor:  sel ? c.dot  : 'transparent',
                        }}
                      >
                        <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: sel ? c.dot : '#d1d5db' }} />
                        {T.cats[cat]}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Actions */}
              <div className="flex gap-3 pt-1">
                <button
                  type="button"
                  onClick={onCancel}
                  className="flex-1 py-3.5 rounded-xl border border-gray-200 text-gray-600 font-semibold hover:bg-gray-50 transition active:scale-95"
                >
                  {T.cancel}
                </button>
                <button
                  type="submit"
                  className="flex-1 py-3.5 rounded-xl text-white font-bold transition hover:opacity-90 active:scale-95"
                  style={{ background: ACCENT, boxShadow: `0 4px 14px ${ACCENT}50` }}
                >
                  {T.save}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ─── HabitCard ─────────────────────────────────────────────────────────────
    function HabitCard({ habit, lang, onToggle, onEdit, onDelete }) {
      const T       = I18N[lang];
      const todayD  = today();
      const done    = (habit.completedDates || []).includes(todayD);
      const { current, longest } = calcStreak(habit.completedDates);
      const c       = CAT[habit.category] || CAT['Fitness'];
      const [popped, setPopped] = useState(false);

      const handleToggle = () => {
        if (!done) { setPopped(true); setTimeout(() => setPopped(false), 300); }
        onToggle(habit.id);
      };

      return (
        <div
          className="bg-white rounded-2xl shadow-sm transition-all duration-200 hover:shadow-md"
          style={{
            border: `1.5px solid ${done ? ACCENT + '35' : '#e5e7eb'}`,
            background: done ? `linear-gradient(135deg, #fff, ${ACCENT}08)` : 'white',
          }}
        >
          <div className="p-4">
            <div className="flex items-start gap-3">

              {/* Circle checkbox */}
              <button
                onClick={handleToggle}
                className={`flex-shrink-0 mt-0.5 w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all duration-200 ${popped ? 'animate-pop' : ''}`}
                style={{
                  borderColor: done ? ACCENT : '#d1d5db',
                  background:  done ? ACCENT : 'white',
                  boxShadow:   done ? `0 0 0 3px ${ACCENT}20` : 'none',
                }}
                aria-label={done ? T.markUndone : T.markDone}
              >
                {done && <span style={{ color: 'white' }}><IconCheck /></span>}
              </button>

              {/* Name + category */}
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span
                    className="text-base font-semibold transition-all leading-snug"
                    style={{ color: done ? '#9ca3af' : '#111827', textDecoration: done ? 'line-through' : 'none' }}
                  >
                    {habit.name}
                  </span>
                  {current > 0 && (
                    <span className="flex items-center gap-0.5 text-sm font-bold" style={{ color: '#f97316' }}>
                      🔥{current}
                    </span>
                  )}
                </div>
                <div className="mt-1.5">
                  <span
                    className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold"
                    style={{ background: c.bg, color: c.text }}
                  >
                    <span className="w-1.5 h-1.5 rounded-full" style={{ background: c.dot }} />
                    {T.cats[habit.category]}
                  </span>
                </div>
              </div>

              {/* Action buttons */}
              <div className="flex items-center gap-0.5 flex-shrink-0 -mr-1">
                <button
                  onClick={() => onEdit(habit)}
                  className="p-2 rounded-xl text-gray-400 hover:text-indigo-500 hover:bg-indigo-50 transition"
                  aria-label={T.edit}
                >
                  <IconEdit />
                </button>
                <button
                  onClick={() => onDelete(habit.id)}
                  className="p-2 rounded-xl text-gray-400 hover:text-red-500 hover:bg-red-50 transition"
                  aria-label={T.delete}
                >
                  <IconTrash />
                </button>
              </div>
            </div>

            {/* Streak row */}
            {(current > 0 || longest > 1) && (
              <div className="mt-3 pt-3 border-t border-gray-100 flex items-center gap-4 text-xs text-gray-400">
                <div className="flex items-center gap-1">
                  <span className="w-1.5 h-1.5 rounded-full" style={{ background: ACCENT }} />
                  <span>
                    <b className="text-gray-700">{current}</b>{' '}
                    {current === 1 ? T.day : T.days} {T.currentStreak.split(' ').pop()}
                  </span>
                </div>
                {longest > 1 && (
                  <>
                    <span className="text-gray-200">|</span>
                    <div className="flex items-center gap-1">
                      <span className="text-amber-400 text-sm">★</span>
                      <span>
                        <b className="text-gray-700">{longest}</b>{' '}
                        {longest === 1 ? T.day : T.days} {T.longestStreak.split(' ').pop()}
                      </span>
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [habits,       setHabits]       = useState(loadHabits);
      const [lang,         setLang]         = useState(loadLang);
      const [modal,        setModal]        = useState(null); // null | 'add' | habit object
      const [apiKey,       setApiKey]       = useState(() => localStorage.getItem(APIKEY_KEY) || '');
      const [toast,        setToast]        = useState(null);
      const [settingsOpen, setSettingsOpen] = useState(false);

      const T       = I18N[lang];
      const todayD  = today();

      // Persist
      useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(habits)); }, [habits]);
      useEffect(() => { localStorage.setItem(LANG_KEY, lang); }, [lang]);

      // ── Derived stats ──
      const doneCount  = habits.filter(h => (h.completedDates || []).includes(todayD)).length;
      const pct        = habits.length ? Math.round((doneCount / habits.length) * 100) : 0;
      const globalBest = habits.reduce((max, h) => Math.max(max, calcStreak(h.completedDates).longest), 0);

      // ── Handlers ──
      const fetchMotivation = useCallback(async (habitName, streak) => {
        if (!apiKey) return;
        setToast(T.aiLoading);
        try {
          const prompt = lang === 'de'
            ? `Ich habe gerade meine Gewohnheit "${habitName}" abgeschlossen! Aktuelle Serie: ${streak} ${streak === 1 ? 'Tag' : 'Tage'}. Schreib eine kurze, motivierende Nachricht auf Deutsch (max. 2 Sätze).`
            : `I just completed my habit "${habitName}"! Current streak: ${streak} ${streak === 1 ? 'day' : 'days'}. Write a short, energizing motivational message (max 2 sentences).`;
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'content-type': 'application/json',
              'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
              model: 'claude-haiku-4-5',
              max_tokens: 120,
              messages: [{ role: 'user', content: prompt }],
            }),
          });
          if (!res.ok) throw new Error('api');
          const data = await res.json();
          const msg = data.content?.[0]?.text?.trim();
          setToast(msg || T.aiError);
        } catch {
          setToast(T.aiError);
        }
      }, [apiKey, lang, T]);

      const toggleHabit = useCallback((id) => {
        setHabits(prev => {
          const h = prev.find(x => x.id === id);
          if (!h) return prev;
          const done = (h.completedDates || []).includes(todayD);
          const newDates = done
            ? (h.completedDates || []).filter(d => d !== todayD)
            : [...(h.completedDates || []), todayD];
          if (!done) {
            const streak = calcStreak(newDates).current;
            setTimeout(() => fetchMotivation(h.name, streak), 0);
          }
          return prev.map(x => x.id !== id ? x : { ...x, completedDates: newDates });
        });
      }, [todayD, fetchMotivation]);

      const saveApiKey = useCallback((key) => {
        setApiKey(key);
        localStorage.setItem(APIKEY_KEY, key);
        setSettingsOpen(false);
      }, []);

      const saveHabit = useCallback(({ name, category }) => {
        if (modal === 'add') {
          setHabits(prev => [...prev, { id: uid(), name, category, completedDates: [], createdAt: todayD }]);
        } else {
          setHabits(prev => prev.map(h => h.id === modal.id ? { ...h, name, category } : h));
        }
        setModal(null);
      }, [modal, todayD]);

      const deleteHabit = useCallback((id) => {
        if (window.confirm(T.deleteConfirm)) {
          setHabits(prev => prev.filter(h => h.id !== id));
        }
      }, [T]);

      // ── Render ──
      return (
        <div className="min-h-screen bg-slate-50 pb-28 select-none">

          {/* ── Header ── */}
          <header className="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-gray-100/80 shadow-sm">
            <div className="max-w-lg mx-auto px-4 h-14 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <IconTrophy />
                <span className="text-lg font-extrabold tracking-tight" style={{ color: ACCENT }}>
                  Daily Wins
                </span>
              </div>

              {/* Settings + Language */}
              <div className="flex items-center gap-2">
              <button
                onClick={() => setSettingsOpen(true)}
                className="p-1.5 rounded-xl text-gray-400 hover:text-indigo-500 hover:bg-indigo-50 transition"
                aria-label={T.settingsTitle}
                title={T.settingsTitle}
              >
                <IconGear />
              </button>
              {/* Language pill */}
              <div className="flex items-center p-1 gap-0.5 rounded-xl" style={{ background: '#f1f5f9' }}>
                {['en', 'de'].map(l => (
                  <button
                    key={l}
                    onClick={() => setLang(l)}
                    className="px-3.5 py-1 rounded-lg text-sm font-bold transition-all duration-200"
                    style={{
                      background: lang === l ? ACCENT : 'transparent',
                      color:      lang === l ? 'white' : '#94a3b8',
                      boxShadow:  lang === l ? `0 2px 8px ${ACCENT}40` : 'none',
                    }}
                  >
                    {l.toUpperCase()}
                  </button>
                ))}
              </div>
              </div>
            </div>
          </header>

          {/* ── Main ── */}
          <main className="max-w-lg mx-auto px-4 pt-5 space-y-4">

            {/* Dashboard card */}
            <div
              className="rounded-3xl p-5 text-white overflow-hidden relative"
              style={{ background: `linear-gradient(135deg, ${ACCENT} 0%, #818cf8 60%, #a5b4fc 100%)` }}
            >
              {/* Decorative circles */}
              <div className="absolute -top-6 -right-6 w-32 h-32 rounded-full opacity-20" style={{ background: 'white' }} />
              <div className="absolute -bottom-8 -left-4 w-24 h-24 rounded-full opacity-10" style={{ background: 'white' }} />

              <div className="relative">
                <p className="text-sm font-medium opacity-80">{T.todayProgress}</p>
                <p className="text-4xl font-black mt-1 mb-3 tracking-tight">{pct}%</p>

                {/* Progress bar */}
                <div className="h-2.5 rounded-full overflow-hidden mb-3" style={{ background: 'rgba(255,255,255,0.25)' }}>
                  <div
                    className="h-full rounded-full transition-all duration-700 ease-out"
                    style={{ width: `${pct}%`, background: 'white' }}
                  />
                </div>

                <p className="text-sm opacity-75">
                  {doneCount} {T.of} {habits.length} {T.habitsCompleted}
                </p>

                {/* Stats row */}
                <div className="grid grid-cols-3 gap-2 mt-5 pt-4" style={{ borderTop: '1px solid rgba(255,255,255,0.2)' }}>
                  {[
                    { label: T.totalHabits,    value: habits.length },
                    { label: T.completedToday, value: doneCount },
                    { label: T.bestStreak,     value: globalBest > 0 ? `${globalBest} 🔥` : '—' },
                  ].map(s => (
                    <div key={s.label} className="text-center">
                      <div className="text-2xl font-black">{s.value}</div>
                      <div className="text-xs opacity-70 mt-0.5 leading-tight">{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Habit list or empty state */}
            {habits.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-20 px-8 text-center">
                <div className="w-20 h-20 rounded-3xl flex items-center justify-center text-4xl mb-5"
                     style={{ background: `${ACCENT}15` }}>
                  ✨
                </div>
                <h3 className="text-xl font-bold text-gray-800 mb-2">{T.noHabitsTitle}</h3>
                <p className="text-gray-500 text-sm leading-relaxed max-w-xs">{T.noHabitsDesc}</p>
                <button
                  onClick={() => setModal('add')}
                  className="mt-6 flex items-center gap-2 px-6 py-3 rounded-2xl text-white font-bold text-sm transition hover:opacity-90 active:scale-95"
                  style={{ background: ACCENT, boxShadow: `0 6px 20px ${ACCENT}40` }}
                >
                  <span className="text-lg leading-none">+</span> {T.addHabit}
                </button>
              </div>
            ) : (
              <div className="space-y-3 animate-fadein">
                {habits.map(h => (
                  <HabitCard
                    key={h.id}
                    habit={h}
                    lang={lang}
                    onToggle={toggleHabit}
                    onEdit={(habit) => setModal(habit)}
                    onDelete={deleteHabit}
                  />
                ))}
              </div>
            )}
          </main>

          {/* ── FAB ── */}
          {habits.length > 0 && (
            <button
              onClick={() => setModal('add')}
              className="fixed bottom-6 right-5 w-14 h-14 rounded-2xl flex items-center justify-center text-white transition-all hover:scale-105 active:scale-95 z-30"
              style={{
                background:  ACCENT,
                boxShadow:   `0 8px 24px ${ACCENT}55`,
              }}
              aria-label={T.addHabit}
            >
              <IconPlus />
            </button>
          )}

          {/* ── Modal ── */}
          {modal && (
            <Modal
              lang={lang}
              habit={modal === 'add' ? null : modal}
              onSave={saveHabit}
              onCancel={() => setModal(null)}
            />
          )}

          {/* ── Settings ── */}
          {settingsOpen && (
            <SettingsModal
              lang={lang}
              apiKey={apiKey}
              onSave={saveApiKey}
              onCancel={() => setSettingsOpen(false)}
            />
          )}

          {/* ── Toast ── */}
          {toast && <Toast message={toast} onDismiss={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
